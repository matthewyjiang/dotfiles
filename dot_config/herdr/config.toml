onboarding = false
[theme]
name = "terminal"
auto_switch = false

[ui]
show_agent_labels_on_pane_borders = true

agent_panel_sort = "priority"
[experimental]
kitty_graphics = true
pane_history = true

[ui.toast]
delivery = "terminal"

[keys]
prefix = "ctrl+a"
focus_pane_left = ["prefix+h", "ctrl+h"]
focus_pane_down = ["prefix+j", "ctrl+j"]
focus_pane_up = ["prefix+k", "ctrl+k"]
focus_pane_right = ["prefix+l", "ctrl+l"]
